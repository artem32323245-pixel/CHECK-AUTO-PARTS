<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошик — CHECK AUTO PARTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-flex">
            <div class="logo">CHECK <span>AUTO PARTS</span></div>
            <nav class="top-nav">
                <ul>
                    <li><a href="index.html">Головна</a></li>
                    <li><a href="catalog.html">Запчастини</a></li>
                    <li><a href="cart.html" class="active">Кошик</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="order-card">
            <h2>Твій кошик</h2>
            <div id="cart-container"></div>
            <p class="total-price-row">Разом: <span id="total-price">0.00</span> ₴</p>

            <h3 class="form-title">Дані для доставки та оплати</h3>
            
            <form id="order-form">
                <input type="text" id="customer-name" placeholder="Твоє ім'я" required>
                <input type="tel" id="customer-phone" placeholder="Номер телефону" required>
                
                <div style="position:relative;">
                    <input type="text" id="city-input" placeholder="Місто доставки" required autocomplete="off">
                    <div id="city-dropdown" class="api-dropdown"></div>
                </div>

                <div style="position:relative;">
                    <input type="text" id="post-input" placeholder="Відділення пошти" required disabled autocomplete="off">
                    <div id="post-dropdown" class="api-dropdown"></div>
                </div>

                <div class="payment-methods">
                    <p style="margin-bottom: 10px; font-size: 14px; color: #ff6600; text-transform: uppercase;">Спосіб оплати:</p>
                    
                    <label class="payment-option">
                        <input type="radio" name="payment" value="При отриманні" checked>
                        <span class="custom-radio"></span> Накладений платіж
                    </label>

                    <label class="payment-option">
                        <input type="radio" name="payment" value="На карту">
                        <span class="custom-radio"></span> Оплата на карту
                    </label>

                    <label class="payment-option">
                        <input type="radio" name="payment" value="Рахунок ФОП">
                        <span class="custom-radio"></span> Рахунок ФОП
                    </label>
                </div>
                
                <button type="submit" class="btn-main" style="width: 100%; margin-top: 20px;">Підтвердити замовлення</button>
            </form>
        </div>
    </main>

    <!-- Стильне модальне вікно -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Дякуємо!</h2>
            <p>Замовлення прийнято. Ми зателефонуємо вам або надішлемо повідомлення для підтвердження.</p>
            <button onclick="closeModal()" class="btn-main">ОК</button>
        </div>
    </div>

    <script src="script_2.js"></script>
</body>
</html>
